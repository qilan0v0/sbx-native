name: Build jar to Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (留空则使用默认)'
        required: false
        type: string
        default: ''

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: |
        cd java
        mvn clean package
        mv target/server-1.0.jar server.jar
        ls -la server.jar

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "java/server.jar"
        tag: ${{ inputs.tag || github.ref_name }}
        name: ${{ inputs.tag || 'java' }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
        body: "Automated release from workflow run #${{ github.run_number }}"
